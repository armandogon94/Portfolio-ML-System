version: '3.9'

# Development override - use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  mlflow:
    ports:
      - "5070:5000"  # Project 07: MLflow UI (dev access)
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=file:///mlflow/artifacts
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db

  ml-api:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_URL=redis://redis:6379/7
    ports:
      - "8070:8000"  # Project 07: Prediction API (FastAPI) - direct dev access
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./checkpoints:/app/checkpoints

  ml-ui:
    environment:
      - STREAMLIT_SERVER_PORT=3000
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_RUNONSAVE=true
      - ML_API_URL=http://localhost:8070  # Use host port in dev
      - MLFLOW_TRACKING_URI=http://localhost:5070  # Use host port in dev
    ports:
      - "3070:3000"  # Project 07: ML Dashboard UI - direct dev access
    volumes:
      - ./ui:/app/ui
      - ./configs:/app/configs
